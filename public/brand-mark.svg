<svg xmlns="http://www.w3.org/2000/svg" viewBox="100 50 320 320" role="img" aria-labelledby="title desc">
  <title id="title">BishopDGreat circuit cross</title>
  <desc id="desc">A circuit-shaped cross with cyan, violet, and gold signal lines.</desc>
  <defs>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#61dbfb"/>
      <stop offset=".52" stop-color="#7e5bff"/>
      <stop offset="1" stop-color="#eebe5c"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="260" cy="210" r="148" fill="#7e5bff" opacity=".045"/>
  <circle cx="260" cy="210" r="112" fill="none" stroke="#ffffff" stroke-opacity=".045"/>
  <g fill="none" stroke="url(#signal)" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M153 210H367M260 72V348" stroke-width="7"/>
    <path d="M168 210v-34h28M352 210v34h-28M260 94h31v25M260 326h-31v-25" stroke-width="4"/>
  </g>
  <g fill="#eebe5c">
    <circle cx="260" cy="210" r="8"/><circle cx="196" cy="176" r="4"/>
    <circle cx="324" cy="244" r="4"/><circle cx="291" cy="119" r="4"/>
    <circle cx="229" cy="301" r="4"/>
  </g>
</svg>
